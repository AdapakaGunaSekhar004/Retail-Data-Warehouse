version: 2

models:
  - name: stg_sales
    description: Cleaned and renamed raw sales records
    columns:
      - name: order_id
        description: Unique order identifier
        data_tests:
          - unique
          - not_null
      - name: order_date
        data_tests:
          - not_null
      - name: customer_id
        data_tests:
          - not_null
      - name: product_id
        data_tests:
          - not_null
      - name: quantity
        data_tests:
          - not_null
      - name: unit_price
        data_tests:
          - not_null
      - name: total_amount
        data_tests:
          - not_null